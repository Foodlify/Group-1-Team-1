version: '3.8'

services:
  db:
    image: postgres:15
    container_name: foodlify_postgres
    restart: always
    environment:
      POSTGRES_USER: foodlify_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: foodlify_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: foodlify_api
    restart: always
    ports:
      - '5000:5000'
    environment:
      - DATABASE_URL=postgresql://foodlify_user:secretpassword@db:5432/foodlify_db
      - PORT=5000
    command: sh -c "npx prisma db push && npx prisma generate && npm run dev"
    depends_on:
      - db
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
volumes:
  postgres_data:
