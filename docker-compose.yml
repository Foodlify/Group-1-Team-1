version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: foodlify_postgres
    restart: always
    environment:
      POSTGRES_USER: foodlify_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: foodlify_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foodlify_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://foodlify_user:secretpassword@db:5432/foodlify_db?schema=public
      - PORT=3000
    depends_on:
      - db
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
volumes:
  postgres_data:
